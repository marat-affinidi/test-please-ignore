name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_call:
  workflow_dispatch:
  repository_dispatch:
    types: [publish]

permissions:
  id-token: write  # Required for OIDC
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm i -g npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish


